name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    # macOS runner: watch.py relies on select.kqueue (BSD/macOS-only), so both
    # pyright and the watch tests require a Darwin platform.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check src/ tests/
      - name: Type check (pyright)
        run: uv run pyright src/ tests/
      - name: Tests (pytest)
        run: uv run pytest tests/ -v
